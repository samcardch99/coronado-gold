<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body style="margin:0; padding:0; background-color:#f5f5f5; font-family: Georgia, 'Times New Roman', serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f5f5; padding: 40px 20px;">
    <tr>
      <td align="center">

        <!-- Carta -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0"
          style="background-color:#ffffff; max-width:600px; width:100%; padding: 60px 56px 50px 56px; box-sizing: border-box;">

          <!-- HEADER: Nombre + Contacto -->
          <tr>
            <td style="padding-bottom: 12px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <!-- Nombre -->
                  <td style="vertical-align: bottom;">
                    <span style="font-family: Georgia, serif; font-size: 26px; font-weight: bold; color: #111111; letter-spacing: 0.01em;">
                      {{username}}
                    </span>
                  </td>
                  <!-- Email + Teléfono -->
                  <td style="vertical-align: bottom; text-align: right;">
                    <div style="font-family: Arial, sans-serif; font-size: 13px; color: #333333; line-height: 1.6;">
                      {{email}}<br/>
                      {{phone}}
                    </div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Línea separadora bicolor -->
          <tr>
            <td style="padding-bottom: 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <!-- Segmento darkRed -->
                  <td width="45%" style="height: 2px; background-color: #6b1a10;"></td>
                  <!-- Segmento gris claro -->
                  <td width="55%" style="height: 2px; background-color: #cccccc;"></td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- CUERPO: Mensaje -->
          <tr>
            <td style="padding-bottom: 80px;">
              <p style="font-family: Arial, sans-serif; font-size: 14px; color: #222222; line-height: 1.7; margin: 0;">
                {{message}}
              </p>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td align="center" style="padding-top: 20px; border-top: 1px solid #eeeeee;">
              <p style="margin: 0; font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; letter-spacing: 0.2em; color: #6b1a10; text-transform: uppercase;">
                CORONADO GOLD
              </p>
            </td>
          </tr>

        </table>
        <!-- Fin carta -->

      </td>
    </tr>
  </table>

</body>
</html>
